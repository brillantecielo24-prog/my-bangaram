<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who owns my heart ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Georgia', serif;
    color: white;
    overflow: hidden;
}

/* 💖 falling hearts */
.bg-heart {
    position: fixed;
    top: -10px;
    font-size: 18px;
    opacity: 0.7;
    animation: floatDown linear infinite;
}

@keyframes floatDown {
    to { transform: translateY(100vh); }
}

/* center text */
.center-text {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
}

/* ✨ GLOW ADDED */
h1 {
    font-size: 42px;
    text-shadow: 
        0 0 8px rgba(255,255,255,0.8),
        0 0 15px rgba(255,182,193,0.7),
        0 0 25px rgba(255,105,180,0.6);
}

#love {
    cursor: pointer;
}

#tease {
    position: absolute;
    bottom: 20%;
    width: 100%;
    text-align: center;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.5s;
}

button {
    position: absolute;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4e50;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="center-text">
    <h1>
        who owns my <span id="love">heart</span> ❤️
    </h1>
</div>

<p id="tease">okay fine… you can catch me now 💖</p>

<button id="moveBtn">me 😌</button>

<script>
let moveCount = 0;
const btn = document.getElementById("moveBtn");
const tease = document.getElementById("tease");

function setInitialPosition() {
    btn.style.left = (window.innerWidth / 2 - 60) + "px";
    btn.style.top = (window.innerHeight / 2) + "px";
}
setInitialPosition();

function triggerMove() {
    if (moveCount < 5) {
        moveButton();
        moveCount++;
    }
    if (moveCount === 5) {
        tease.style.opacity = 1;
    }
}

btn.addEventListener("mouseover", triggerMove);
btn.addEventListener("click", triggerMove);

function moveButton() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

btn.addEventListener("click", () => {
    if (moveCount >= 5) {
        btn.innerText = "you got me ❤️";
        setTimeout(() => {
            window.location.href = "page2.html";
        }, 800);
    }
});

document.getElementById("love").addEventListener("click", () => {
    window.location.href = "page2.html";
});

/* 💖 falling hearts */
function createBgHeart() {
    const heart = document.createElement("div");
    heart.classList.add("bg-heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 5 + 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}

setInterval(createBgHeart, 700);
</script>

</body>
</html>
