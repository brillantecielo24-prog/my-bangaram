<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready for surprise ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    font-family: 'Georgia', serif;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* ✨ GLOW ADDED */
h1 {
    position: absolute;
    top: 10%;
    font-size: 32px;
    text-align: center;
    padding: 0 10px;
    text-shadow: 
        0 0 8px rgba(255,255,255,0.8),
        0 0 15px rgba(255,182,193,0.7),
        0 0 25px rgba(255,105,180,0.6);
}

.teddy-container {
    display: flex;
    align-items: center;
    gap: 40px;
}

.teddy {
    font-size: 130px;
}

.heart {
    position: relative;
    font-size: 110px;
    cursor: pointer;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
}

/* ✨ glow for text inside heart */
.heart-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    width: 120px;
    text-align: center;
    font-weight: bold;
    text-shadow: 
        0 0 6px rgba(255,255,255,0.8),
        0 0 12px rgba(255,105,180,0.7);
}
</style>
</head>

<body>

<h1>ready for the surprise hehe 😌❤️</h1>

<div class="teddy-container">
    <div class="teddy">🧸</div>

    <div class="heart" onclick="goNext()">
        ❤️
        <div class="heart-text">click if you<br>love me too</div>
    </div>

    <div class="teddy">🧸</div>
</div>

<script>
function goNext() {
    window.location.href = "page3.html";
}
</script>

</body>
</html>
